---

- name: detect download informations
  when:
    - not running_in_check_mode
  become: false
  delegate_to: localhost
  run_once: true
  influx_download_data:
    major_version: "{{ influxdb_main_version }}"
    version: "{{ influxdb_version }}"
  register: influx_downloads

- name: re-define influxdb_version
  ansible.builtin.set_fact:
    influxdb_version: "{{ influx_downloads.version }}"
    influxdb_download_artifact: "{{ influx_downloads.download_artifact }}"
    influxdb_download_url: "{{ influx_downloads.download_url }}"
    influxdb_download_checksum: "{{ influx_downloads.download_checksum }}"

