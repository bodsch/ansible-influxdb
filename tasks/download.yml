- name: define delegate instance for download handling
  when:
    - not running_in_check_mode
    - influxdb_direct_download
  ansible.builtin.set_fact:
    influxdb_delegate_to: "{{ ansible_facts.host }}"
    influxdb_local_tmp_directory: "{{
        lookup('env', 'CUSTOM_LOCAL_TMP_DIRECTORY') |
        default('/var/cache/ansible/influxdb', true) }}/{{ influxdb_version }}"

- name: merge influxdb configuration between defaults and custom
  ansible.builtin.set_fact:
    influxdb_release: "{{ influxdb_defaults_release | combine(influxdb_release, recursive=True) | influxdb_update_release(core_version=influxdb_version, client_version=influxdb_cli_version) }}"

- name: define download url for influxdb and influx-cli
  ansible.builtin.set_fact:
    influxdb_download_url: "{{ influxdb_release.download_urls.core }}/{{ influxdb_release.files.core }}"
    influxdb_client_download_url: "{{ influxdb_release.download_urls.client }}/{{ influxdb_release.files.client }}"

- name: create download directory
  when:
    - not running_in_check_mode
  become: false
  delegate_to: "{{ influxdb_delegate_to }}"
  run_once: "{{ 'false' if influxdb_direct_download else 'true' }}"
  ansible.builtin.file:
    path: "{{ influxdb_local_tmp_directory }}"
    state: directory
    mode: "0750"

- name: detect the downloaded influxdb archive
  become: false
  delegate_to: "{{ influxdb_delegate_to }}"
  run_once: "{{ 'false' if influxdb_direct_download else 'true' }}"
  ansible.builtin.stat:
    path: "{{ influxdb_local_tmp_directory }}/{{ influxdb_release.files.core }}"
  register: stat_influxdb_archive

- name: detect the downloaded influx client archive
  when:
    - not running_in_check_mode
    - influxdb_main_version | int == 2
  become: false
  delegate_to: "{{ influxdb_delegate_to }}"
  run_once: "{{ 'false' if influxdb_direct_download else 'true' }}"
  ansible.builtin.stat:
    path: "{{ influxdb_local_tmp_directory }}/{{ influxdb_release.files.client }}"
  register: stat_influx_client_archive

- name: download core
  when:
    - not running_in_check_mode
    - stat_influxdb_archive.stat is defined and not stat_influxdb_archive.stat.exists | default('false')
  block:
    - name: download influxdb archiv {{ influxdb_release.files.core }}
      become: false
      delegate_to: "{{ influxdb_delegate_to }}"
      run_once: "{{ 'false' if influxdb_direct_download else 'true' }}"
      ansible.builtin.get_url:
        url: "{{ influxdb_download_url }}"
        dest: "{{ influxdb_local_tmp_directory }}/"
        mode: "0640"
      register: _download_archive
      until: _download_archive is succeeded
      retries: 10
      delay: 5
      check_mode: false

  rescue:
    - name: delete download directory
      become: false
      delegate_to: "{{ influxdb_delegate_to }}"
      run_once: "{{ 'false' if influxdb_direct_download else 'true' }}"
      ansible.builtin.file:
        path: "{{ influxdb_local_tmp_directory }}"
        state: absent

    - name: exit with fail
      ansible.builtin.fail:
        msg: A serious error occurred when downloading the archive.

- name: download client
  when:
    - not running_in_check_mode
    - influxdb_main_version | int == 2
    - stat_influx_client_archive.stat is defined and not stat_influx_client_archive.stat.exists | default('false')
  block:
    - name: download influx-client archiv {{ influxdb_release.files.client }}
      become: false
      delegate_to: "{{ influxdb_delegate_to }}"
      run_once: "{{ 'false' if influxdb_direct_download else 'true' }}"
      ansible.builtin.get_url:
        url: "{{ influxdb_client_download_url }}"
        dest: "{{ influxdb_local_tmp_directory }}/"
        mode: "0640"
      register: _download_archive
      until: _download_archive is succeeded
      retries: 10
      delay: 5
      check_mode: false

  rescue:
    - name: delete download directory
      become: false
      delegate_to: "{{ influxdb_delegate_to }}"
      run_once: "{{ 'false' if influxdb_direct_download else 'true' }}"
      ansible.builtin.file:
        path: "{{ influxdb_local_tmp_directory }}"
        state: absent

    - name: exit with fail
      ansible.builtin.fail:
        msg: A serious error occurred when downloading the archive.

