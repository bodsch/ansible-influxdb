---

# influx-cli
- name: detect installed influx-client binary {{ influxdb_install_paths.client }}/influx
  ansible.builtin.stat:
    path: "{{ influxdb_install_paths.client }}/influx"
  register: stat_influx_client_binary

# influx (cli tool)
- name: client
  when:
    - stat_influx_client_binary.stat is defined
    - not stat_influx_client_binary.stat.exists | default('false')
  block:
    - name: propagate influx archive
      ansible.builtin.copy:
        src: "{{ influxdb_local_tmp_directory }}/{{ influxdb_release.files.influx_client }}"
        dest: "{{ influxdb_install_paths.client }}/"
        mode: "0755"
        remote_src: "{{ 'true' if influxdb_direct_download else 'false' }}"

    - name: extract influx-client archiv
      ansible.builtin.unarchive:
        src: "{{ influxdb_install_paths.client }}/{{ influxdb_release.files.influx_client }}"
        dest: "{{ influxdb_install_paths.client }}/"
        copy: false
        #extra_opts:
        #  - --strip-components=1

    - name: make sure influx is executable
      ansible.builtin.file:
        path: "{{ influxdb_install_paths.client }}/influx"
        mode: "0755"
        owner: "{{ influxdb_system_user }}"
        group: "{{ influxdb_system_group }}"

    - name: remove influxd archive
      ansible.builtin.file:
        path: "{{ influxdb_install_paths.client }}/{{ influxdb_release.files.influx_client }}"
        state: absent

  rescue:
    - name: delete install directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - influxdb_install_paths.client

    - name: exit with fail
      ansible.builtin.fail:
        msg: A serious error occurred during the installation of the binary.

- name: detect activated influx client
  ansible.builtin.stat:
    path: /usr/bin/influx
  register: stat_influx_activated

- name: detect, if influx {{ influxdb_cli_version }} activated
  ansible.builtin.set_fact:
    influx_must_activated: "{{ not stat_influx_activated.stat | bodsch.core.linked_version(install_path=influxdb_install_paths.client, version=influxdb_cli_version) }}"

- name: activate influx
  when:
    - stat_influx_client_binary.stat is defined
    - stat_influx_client_binary.stat.exists | default(false)
    - influx_must_activated
  block:
    - name: create link to influx binary
      ansible.builtin.file:
        src: "{{ influxdb_install_paths.client }}/influx"
        dest: /usr/bin/influx
        state: link
        force: true
