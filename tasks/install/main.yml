---

- name: user and group handling
  when:
    - not running_in_check_mode
    - influxdb_system_user != "root"
  block:
    - name: create influxdb group
      ansible.builtin.group:
        name: "{{ influxdb_system_group }}"
        state: present
        system: true

    - name: create influxdb user
      ansible.builtin.user:
        name: "{{ influxdb_system_user }}"
        groups: "{{ influxdb_system_group }}"
        append: true
        shell: /usr/sbin/nologin
        system: true
        createhome: false
        home: "{{ influxdb_storage_dir }}"

- name: create install directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ influxdb_system_user }}"
    group: "{{ influxdb_system_group }}"
    mode: "0755"
  loop:
    - "{{ influxdb_install_paths.core }}"
    - "{{ influxdb_install_paths.client }}"

- name: merge influxdb configuration between defaults and custom
  ansible.builtin.set_fact:
    influxdb_release: "{{ influxdb_defaults_release | combine(influxdb_release, recursive=True) | influxdb_update_release(core_version=influxdb_version, client_version=influxdb_cli_version) }}"


- name: influxdb2
  ansible.builtin.include_tasks: install/influxdb2.yml
  when:
    - not running_in_check_mode
    - influxdb_main_version | int == 2

- name: influx client
  ansible.builtin.include_tasks: install/influx-client.yml
  when:
    - not running_in_check_mode
    - influxdb_main_version | int == 2
    - influxdb_cli_version | default('') | string | length > 0

- name: influxdb3
  ansible.builtin.include_tasks: install/influxdb3.yml
  when:
    - not running_in_check_mode
    - influxdb_main_version | int == 3


- name: create influxdb data directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ influxdb_system_user }}"
    group: "{{ influxdb_system_group }}"
    mode: "0755"
  loop:
    - "{{ influxdb_storage_dir }}"
    - "{{ influxdb_storage_dir }}/meta"
    - "{{ influxdb_storage_dir }}/data"
    - "{{ influxdb_storage_dir }}/wal"

- name: systemd
  when:
    - ansible_facts.service_mgr | lower == "systemd"
  block:

    - name: create influxdb run configuration
      ansible.builtin.template:
        src: "default/influxdb.j2"
        dest: "{{ influxdb_defaults_directory }}/influxdb"
        force: true
        owner: root
        group: "{{ influxdb_system_group }}"
        mode: "0640"
      notify:
        # - validate config
        - restart service

    - name: create systemd service unit
      ansible.builtin.template:
        src: "init/systemd/influxdb.service.j2"
        dest: "{{ systemd_lib_directory }}/{{ influxdb_release.binaries.core }}.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - systemd daemon reload
        - restart service

- name: openrc
  when:
    - ansible_facts.service_mgr | lower == "openrc"
  block:
    - name: create openrc service configuration
      ansible.builtin.template:
        src: "init/openrc/conf.d/influxdb.j2"
        dest: "/etc/conf.d/{{ influxdb_release.binaries.core }}"
        owner: root
        group: root
        mode: "0644"

    - name: create openrc init configuration
      ansible.builtin.template:
        src: "init/openrc/init.d/influxdb.j2"
        dest: "/etc/init.d/{{ influxdb_release.binaries.core }}"
        owner: root
        group: root
        mode: "0750"

- name: create custom fact file
  bodsch.core.facts:
    name: influxdb
    facts:
      version:
        core: "{{ influxdb_version }}"
        client: "{{ influxdb_cli_version }}"

...


