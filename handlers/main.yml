---

- name: systemd daemon reload
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
    force: true
  when:
    - ansible_facts.service_mgr | lower == "systemd"

- name: start service
  ansible.builtin.service:
    name: "{{ influxdb_release.binaries.core }}"
    state: started

- name: restart service
  ansible.builtin.service:
    name: "{{ influxdb_release.binaries.core }}"
    state: restarted

- name: reload service
  ansible.builtin.service:
    name: "{{ influxdb_release.binaries.core }}"
    state: reloaded

...
